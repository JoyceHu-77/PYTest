# =============================================================================
# docker-compose.yml：编排一个或多个容器（服务名、构建方式、端口、重启策略等）。
# 启动：在项目根目录执行 docker compose up --build
# =============================================================================

# 可选：在与本文件同目录创建 .env，写入 POSTGRES_PASSWORD=你的强密码（与 MySQL 共用，勿提交 git）
services:
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      MYSQL_DATABASE: appdb
      MYSQL_USER: app
      MYSQL_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  api:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://app:${POSTGRES_PASSWORD:-appsecret}@db:3306/appdb?charset=utf8mb4
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysqldata:
